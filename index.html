<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trygg just nu – swipe</title>

<style>
:root{
  --ink:#1d2440;
  --muted:#6f7997;
  --white2:rgba(255,255,255,.92);
  --line:rgba(198,206,233,.5);
  --shadow:0 16px 38px rgba(80,96,180,.14);
  --shadow2:0 8px 22px rgba(80,96,180,.10);
  --blue:#6b79ff;
  --greenSoft:#e8f8ee;
  --yellowSoft:#fff4d7;
  --redSoft:#ffe9ee;
  --purpleSoft:#f3ecff;
  --pinkSoft:#ffeef5;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#f8f7ff,#eef3ff 55%,#fbfcff);}
body{overflow:hidden}
a{text-decoration:none;color:inherit}

.pages{height:100dvh;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;}
.page{flex:0 0 100%;height:100dvh;scroll-snap-align:start;padding:18px 16px 24px;}
.shell{max-width:440px;margin:0 auto;height:100%;display:flex;flex-direction:column;}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;box-shadow:var(--shadow2);font-weight:900;}

.brand{text-align:center;flex:1}
.brand .main{font-size:28px;font-weight:900}
.brand .sub{font-size:14px;color:var(--muted)}

.screen{flex:1;overflow:auto;background:rgba(255,255,255,.6);backdrop-filter:blur(18px);border-radius:38px;padding:22px;box-shadow:var(--shadow)}

.badge{display:inline-block;padding:10px 14px;border-radius:999px;font-weight:900}
.green{background:var(--greenSoft)}
.yellow{background:var(--yellowSoft)}
.red{background:var(--redSoft)}

.note{margin-top:12px;padding:14px;border-radius:18px;font-weight:700}
.note.green{background:var(--greenSoft)}
.note.yellow{background:var(--yellowSoft)}
.note.red{background:var(--redSoft)}

.title{font-size:30px;font-weight:900;margin:10px 0}

.item{padding:14px;border-radius:18px;background:#fff;margin-top:10px;border:1px solid #eee}

/* KRISPLAN VISNING */
.customBox{
  margin-top:12px;
  padding:14px;
  border-radius:18px;
  background:#fff;
  border:1px solid #ddd;
  display:none;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="pages">

<!-- START -->
<section class="page">
<div class="shell">
<div class="topbar">
<div class="circle">☰</div>
<div class="brand"><div class="main">Trygg just nu</div></div>
<div class="circle">›</div>
</div>

<div class="screen">
<div class="title">Hur känns det?</div>

<div class="item"><a href="#krisplan">📝 Min krisplan</a></div>
<div class="item"><a href="#gron">🌿 Grön</a></div>
<div class="item"><a href="#gul">🌤️ Gul</a></div>
<div class="item"><a href="#rod">🔴 Röd</a></div>

</div>
</div>
</section>

<!-- GRÖN -->
<section class="page" id="gron">
<div class="shell">
<div class="topbar"><div class="circle">‹</div><div class="brand"><div class="main">Grön zon</div></div><div class="circle">›</div></div>

<div class="screen">
<div class="badge green">Grön</div>
<div class="title">Du mår lite bättre</div>

<div id="gronText" class="customBox"></div>

<div class="note green">Gör något lugnt som hjälper dig.</div>
</div>
</div>
</section>

<!-- GUL -->
<section class="page" id="gul">
<div class="shell">
<div class="topbar"><div class="circle">‹</div><div class="brand"><div class="main">Gul zon</div></div><div class="circle">›</div></div>

<div class="screen">
<div class="badge yellow">Gul</div>
<div class="title">Det börjar bli jobbigt</div>

<div id="gulText" class="customBox"></div>

<div class="note yellow">Ta en sak i taget.</div>
</div>
</div>
</section>

<!-- RÖD -->
<section class="page" id="rod">
<div class="shell">
<div class="topbar"><div class="circle">‹</div><div class="brand"><div class="main">Röd zon</div></div><div class="circle">›</div></div>

<div class="screen">
<div class="badge red">Röd</div>
<div class="title">Akut läge</div>

<div id="rodText" class="customBox"></div>

<div class="note red">Säg till personal eller ring hjälp direkt.</div>
</div>
</div>
</section>

<!-- KRISPLAN -->
<section class="page" id="krisplan">
<div class="shell">
<div class="topbar"><div class="circle">‹</div><div class="brand"><div class="main">Krisplan</div></div><div class="circle">⌂</div></div>

<div class="screen">

<input id="gulZonHjalp" class="item" placeholder="Vad hjälper i gul zon">
<input id="gronZonHjalp" class="item" placeholder="Vad hjälper i grön zon">
<input id="akutHjalp" class="item" placeholder="Vad hjälper i akut läge">

<button class="item" onclick="save()">Spara</button>

</div>
</div>
</section>

</div>

<script>
const keys = ["gulZonHjalp","gronZonHjalp","akutHjalp"];

function save(){
  keys.forEach(k=>{
    const el = document.getElementById(k);
    localStorage.setItem(k, el.value || "");
  });
  render();
}

function render(){
  const gul = localStorage.getItem("gulZonHjalp");
  const gron = localStorage.getItem("gronZonHjalp");
  const rod = localStorage.getItem("akutHjalp");

  setBox("gulText", gul);
  setBox("gronText", gron);
  setBox("rodText", rod);
}

function setBox(id, text){
  const el = document.getElementById(id);
  if(!el) return;
  if(text && text.trim() !== ""){
    el.style.display = "block";
    el.textContent = text;
  } else {
    el.style.display = "none";
  }
}

render();
</script>

</body>
</html>
