<!DOCTYPE html>

<html lang="sv">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trygg just nu</title>

<style>

body {

  font-family: Arial;

  background: #f2f2f2;

  padding: 20px;

}

h1 {

  text-align: center;

}

.box {

  background: white;

  padding: 15px;

  border-radius: 15px;

  margin: 10px 0;

}

button {

  width: 100%;

  padding: 15px;

  border-radius: 15px;

  border: none;

  margin-top: 10px;

  font-size: 16px;

}

.green { background: #e8f8ee; }

.yellow { background: #fff4d7; }

.red { background: #ffe9ee; }

.big {

  background: purple;

  color: white;

  font-size: 18px;

}

</style>

</head>

<body>

<h1>Hur känns det just nu?</h1>

<div class="box green">

  <h2>Grön zon</h2>

  <div id="greenList"></div>

  <input id="greenInput" placeholder="Lägg till..." />

  <button onclick="addItem('green')">Spara</button>

</div>

<div class="box yellow">

  <h2>Gul zon</h2>

  <div id="yellowList"></div>

  <input id="yellowInput" placeholder="Lägg till..." />

  <button onclick="addItem('yellow')">Spara</button>

</div>

<div class="box red">

  <h2>Röd zon</h2>

  <div id="redList"></div>

  <input id="redInput" placeholder="Lägg till..." />

  <button onclick="addItem('red')">Spara</button>

</div>

<button class="big">Jag behöver hjälp nu</button>

<script>

function addItem(zone) {

  let input = document.getElementById(zone + "Input");

  let value = input.value;

  if (!value) return;

  let list = JSON.parse(localStorage.getItem(zone)) || [];

  list.push(value);

  localStorage.setItem(zone, JSON.stringify(list));

  input.value = "";

  loadItems();

}

function loadItems() {

  ["green", "yellow", "red"].forEach(zone => {

    let list = JSON.parse(localStorage.getItem(zone)) || [];

    let container = document.getElementById(zone + "List");

    container.innerHTML = "";

    list.forEach(item => {

      let div = document.createElement("div");

      div.textContent = "• " + item;

      container.appendChild(div);

    });

  });

}

loadItems();

</script>

</body>

</html>
