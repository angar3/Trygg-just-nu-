<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trygg just nu – stabil version</title>

<style>
:root{
  --ink:#1d2440;
  --muted:#6f7997;
  --white2:rgba(255,255,255,.92);
  --line:rgba(198,206,233,.5);
  --shadow:0 16px 38px rgba(80,96,180,.14);
  --shadow2:0 8px 22px rgba(80,96,180,.10);
  --blue:#6b79ff;
  --greenSoft:#e8f8ee;
  --yellowSoft:#fff4d7;
  --redSoft:#ffe9ee;
  --purpleSoft:#f3ecff;
  --pinkSoft:#ffeef5;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);
  background: linear-gradient(180deg,#f8f7ff,#eef3ff);
}

body{overflow:hidden}

a{text-decoration:none;color:inherit}

.pages{
  height:100dvh;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}

.page{
  flex:0 0 100%;
  height:100dvh;
  scroll-snap-align:start;
  padding:18px 16px;
}

.shell{max-width:440px;margin:0 auto;height:100%;display:flex;flex-direction:column;}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}

.circle{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#fff;
  border:1px solid #ddd;
}

.brand{text-align:center;flex:1}

.brand .main{font-size:24px;font-weight:900}

.screen{
  flex:1;
  background:#fff;
  border-radius:28px;
  padding:18px;
  overflow:auto;
  box-shadow:var(--shadow);
}

.card,.item,.navbtn{
  display:block;
  border-radius:20px;
  padding:14px;
  border:1px solid var(--line);
  background:#fff;
  margin-bottom:10px;
}

.input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:14px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  background:var(--blue);
  color:#fff;
  font-weight:800;
}

.calllink{
  display:block;
  padding:12px;
  border:1px solid #ddd;
  border-radius:14px;
  margin-top:8px;
}

.disabled{opacity:.5;pointer-events:none}
</style>
</head>

<body>

<div class="pages">

<!-- START -->
<section class="page">
<div class="shell">

<div class="topbar">
<a class="circle" href="#krisplan">☰</a>
<div class="brand"><div class="main">Trygg just nu</div></div>
<a class="circle" href="#hemma">›</a>
</div>

<div class="screen">
<h2>Hur känns det?</h2>

<a class="card" href="#hemma">🏠 Hemma</a>
<a class="card" href="#avdelning">🏥 Avdelning</a>
<a class="card" href="#krisplan">📝 Krisplan</a>

</div>
</div>
</section>

<!-- HEMMA -->
<section class="page" id="hemma">
<div class="shell">
<div class="topbar">
<a class="circle" href="#start">‹</a>
<div class="brand"><div class="main">Hemma</div></div>
<a class="circle" href="#krisplan">›</a>
</div>

<div class="screen">
<a class="card" href="#krisplan">Öppna krisplan</a>
</div>
</div>
</section>

<!-- KRISPLAN -->
<section class="page" id="krisplan">
<div class="shell">
<div class="topbar">
<a class="circle" href="#start">‹</a>
<div class="brand"><div class="main">Krisplan</div></div>
<a class="circle" href="#start">⌂</a>
</div>

<div class="screen">

<input id="psykiakuten" class="input" placeholder="Psykiakuten nummer">
<input id="narstaende" class="input" placeholder="Närstående">

<button onclick="savePlan()">Spara</button>

<a id="callPsykiakuten" class="calllink disabled" href="#" onclick="dial('psykiakuten');return false;">Ring psykiakuten</a>
<a id="callNarstaende" class="calllink disabled" href="#" onclick="dial('narstaende');return false;">Ring närstående</a>

</div>
</div>
</section>

</div>

<script>
(function(){

const fields = ["psykiakuten","narstaende"];

function get(id){
  return document.getElementById(id);
}

function clean(v){
  return (v||"").replace(/[^\d+]/g,"");
}

window.dial = function(id){
  const el = get(id);
  const val = el ? el.value : localStorage.getItem(id);
  const num = clean(val);
  if(num) location.href="tel:"+num;
  else alert("Skriv in nummer först");
}

function refresh(){
  const p = get("psykiakuten")?.value || "";
  const n = get("narstaende")?.value || "";

  const cp = get("callPsykiakuten");
  const cn = get("callNarstaende");

  if(cp) cp.classList.toggle("disabled", !clean(p));
  if(cn) cn.classList.toggle("disabled", !clean(n));
}

window.savePlan = function(){
  fields.forEach(id=>{
    const el = get(id);
    if(el) localStorage.setItem(id, el.value||"");
  });
  refresh();
}

function load(){
  fields.forEach(id=>{
    const el = get(id);
    if(el){
      el.value = localStorage.getItem(id)||"";
      el.addEventListener("input", refresh);
    }
  });
  refresh();
}

document.addEventListener("DOMContentLoaded", load);

})();
</script>

</body>
</html>
