<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trygg just nu – swipe</title>

<style>
:root{
  --ink:#1d2440;
  --muted:#6f7997;
  --white2:rgba(255,255,255,.92);
  --line:rgba(198,206,233,.5);
  --shadow:0 16px 38px rgba(80,96,180,.14);
  --shadow2:0 8px 22px rgba(80,96,180,.10);
  --blue:#6b79ff;
  --greenSoft:#e8f8ee;
  --yellowSoft:#fff4d7;
  --redSoft:#ffe9ee;
  --purple:#b48cff;
  --purpleSoft:#f3ecff;
  --pinkSoft:#ffeef5;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 10%, rgba(170,206,255,.75), transparent 24%),
    radial-gradient(circle at 84% 18%, rgba(245,191,255,.55), transparent 24%),
    radial-gradient(circle at 30% 82%, rgba(188,248,218,.45), transparent 20%),
    linear-gradient(180deg,#f8f7ff,#eef3ff 55%,#fbfcff);
}

body{overflow:hidden}

.pages{
  height:100dvh;
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}

.page{
  flex:0 0 100%;
  scroll-snap-align:start;
  padding:18px;
}

.shell{max-width:440px;margin:0 auto;height:100%;display:flex;flex-direction:column;}

.screen{
  flex:1;
  border-radius:38px;
  background:rgba(255,255,255,.56);
  border:1px solid rgba(255,255,255,.8);
  backdrop-filter:blur(18px);
  box-shadow:var(--shadow);
  padding:22px;
  overflow:auto;
}

.hero{font-size:50px;font-weight:900;margin:10px 0}
.title{font-size:34px;font-weight:900;margin:10px 0}
.p{color:var(--muted)}

.note{
  margin:12px 0;
  padding:16px;
  border-radius:20px;
  font-weight:700;
  white-space:pre-wrap;
}

.green{background:var(--greenSoft)}
.yellow{background:var(--yellowSoft)}
.red{background:var(--redSoft)}

.input{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  margin:8px 0;
  font-size:16px;
}

textarea.input{
  min-height:90px;
  resize:vertical;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#6b79ff,#b48cff);
  color:#fff;
  font-weight:900;
}

.card{padding:14px;border-radius:18px;background:rgba(255,255,255,.7);margin:10px 0}

.help{
  display:block;
  text-align:center;
  margin-top:18px;
  padding:20px;
  border-radius:30px;
  background:linear-gradient(135deg,#6b79ff,#b48cff);
  color:#fff;
  font-size:22px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="pages">

<!-- START -->
<section class="page">
<div class="shell">
<div class="screen">
<div class="hero">Trygg just nu</div>
<p class="p">Svep för att gå vidare</p>
</div>
</div>
</section>

<!-- KRISPLAN -->
<section class="page">
<div class="shell">
<div class="screen">

<div class="title">Min krisplan</div>

<input id="psy" class="input" placeholder="Psykiakuten nummer">

<textarea id="gron" class="input" placeholder="Grön zon - vad hjälper dig"></textarea>
<textarea id="gul" class="input" placeholder="Gul zon - vad hjälper dig"></textarea>
<textarea id="rod" class="input" placeholder="Röd zon - vad hjälper dig"></textarea>

<button onclick="save()">Spara krisplan</button>

</div>
</div>
</section>

<!-- GRÖN -->
<section class="page">
<div class="shell">
<div class="screen">
<div class="title">🟢 Grön zon</div>
<div id="outG" class="note green"></div>
</div>
</div>
</section>

<!-- GUL -->
<section class="page">
<div class="shell">
<div class="screen">
<div class="title">🟡 Gul zon</div>
<div id="outY" class="note yellow"></div>
</div>
</div>
</section>

<!-- RÖD -->
<section class="page">
<div class="shell">
<div class="screen">
<div class="title">🔴 Röd zon</div>
<div id="outR" class="note red"></div>
</div>
</div>
</section>

</div>

<script>
function load(){
  ["psy","gron","gul","rod"].forEach(id=>{
    document.getElementById(id).value =
      localStorage.getItem(id) || "";
  });
  render();
}

function save(){
  ["psy","gron","gul","rod"].forEach(id=>{
    localStorage.setItem(id,
      document.getElementById(id).value);
  });
  render();
}

function render(){
  document.getElementById("outG").textContent =
    localStorage.getItem("gron") || "Inget skrivet";

  document.getElementById("outY").textContent =
    localStorage.getItem("gul") || "Inget skrivet";

  document.getElementById("outR").textContent =
    localStorage.getItem("rod") || "Inget skrivet";
}

load();
</script>

</body>
</html>
