<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trygg just nu</title>

<style>
body{margin:0;font-family:sans-serif;background:#eef3ff}
.page{padding:20px;max-width:500px;margin:auto}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc}
button{width:100%;padding:14px;border:0;border-radius:10px;background:#6b79ff;color:white;font-size:16px}
.zone{padding:15px;border-radius:12px;margin-top:10px}
.green{background:#e8f8ee}
.yellow{background:#fff4d7}
.red{background:#ffe9ee}
a{color:inherit;text-decoration:none}
.nav{display:flex;gap:10px}
.nav a{flex:1;text-align:center;background:white;padding:12px;border-radius:10px}
h2{margin-top:0}
</style>
</head>

<body>

<div class="page">

<h2>Trygg just nu</h2>

<div class="nav">
<a href="#krisplan">Krisplan</a>
<a href="#gron">Grön</a>
<a href="#gul">Gul</a>
<a href="#rod">Röd</a>
</div>

<!-- KRISPLAN -->
<div id="krisplan" class="card">
<h3>Krisplan</h3>

<input id="psykiakuten" placeholder="Psykiakuten nummer">

<textarea id="gronText" placeholder="Vad hjälper i grön zon"></textarea>
<textarea id="gulText" placeholder="Vad hjälper i gul zon"></textarea>
<textarea id="rodText" placeholder="Vad hjälper i röd zon"></textarea>

<button onclick="save()">Spara</button>

<p id="msg"></p>
</div>

<!-- GRÖN -->
<div id="gron" class="card">
<h3>🟢 Grön zon</h3>
<div id="showGreen" class="zone green"></div>
</div>

<!-- GUL -->
<div id="gul" class="card">
<h3>🟡 Gul zon</h3>
<div id="showYellow" class="zone yellow"></div>
</div>

<!-- RÖD -->
<div id="rod" class="card">
<h3>🔴 Röd zon</h3>
<div id="showRed" class="zone red"></div>
</div>

</div>

<script>
function load(){
  document.getElementById("psykiakuten").value =
    localStorage.getItem("psykiakuten") || "";

  document.getElementById("gronText").value =
    localStorage.getItem("gronText") || "";

  document.getElementById("gulText").value =
    localStorage.getItem("gulText") || "";

  document.getElementById("rodText").value =
    localStorage.getItem("rodText") || "";

  show();
}

function save(){
  localStorage.setItem("psykiakuten", document.getElementById("psykiakuten").value);
  localStorage.setItem("gronText", document.getElementById("gronText").value);
  localStorage.setItem("gulText", document.getElementById("gulText").value);
  localStorage.setItem("rodText", document.getElementById("rodText").value);

  show();
  document.getElementById("msg").textContent = "Sparat!";
}

function show(){
  document.getElementById("showGreen").textContent =
    localStorage.getItem("gronText") || "Ingen text";

  document.getElementById("showYellow").textContent =
    localStorage.getItem("gulText") || "Ingen text";

  document.getElementById("showRed").textContent =
    localStorage.getItem("rodText") || "Ingen text";
}

load();
</script>

</body>
</html>
