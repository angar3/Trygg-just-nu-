<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trygg just nu</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b79ff">

<style>
:root{
  --ink:#1d2440;
  --muted:#6f7997;
  --glass:rgba(255,255,255,.55);
  --line:rgba(198,206,233,.5);
  --shadow:0 16px 38px rgba(80,96,180,.14);
  --green:#e8f8ee;
  --yellow:#fff4d7;
  --red:#ffe9ee;
  --blue:#6b79ff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#f8f7ff,#eef3ff);
  overflow:hidden;
  color:var(--ink);
}

.pages{
  display:flex;
  height:100vh;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}

.page{
  flex:0 0 100%;
  scroll-snap-align:start;
  padding:16px;
}

.shell{max-width:460px;margin:auto;height:100%;display:flex;flex-direction:column;}

.glass{
  flex:1;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border-radius:32px;
  border:1px solid rgba(255,255,255,.7);
  box-shadow:var(--shadow);
  padding:18px;
  overflow:auto;
}

h1{margin:0;font-size:34px}
h2{margin:10px 0}

input,textarea{
  width:100%;
  margin:8px 0;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  font-size:15px;
}

textarea{min-height:80px;resize:vertical}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#6b79ff,#b48cff);
  color:#fff;
  font-weight:900;
}

.nav{
  display:flex;
  gap:8px;
  margin:10px 0;
}

.nav a{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:14px;
  background:rgba(255,255,255,.7);
  text-decoration:none;
  font-weight:800;
}

.zoneBox{
  padding:14px;
  border-radius:18px;
  margin-top:10px;
  white-space:pre-wrap;
  font-weight:600;
}

.green{background:var(--green)}
.yellow{background:var(--yellow)}
.red{background:var(--red)}

.fab{
  position:fixed;
  bottom:18px;
  right:18px;
  width:62px;
  height:62px;
  border-radius:50%;
  background:#ff4d6d;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:900;
  box-shadow:0 10px 25px rgba(255,77,109,.4);
}
</style>
</head>

<body>

<a class="fab" href="#r">⚡</a>

<div class="pages">

<!-- START -->
<section class="page">
<div class="shell">
<div class="glass">
<h1>Trygg just nu</h1>

<div class="nav">
<a href="#kris">Krisplan</a>
<a href="#g">Grön</a>
<a href="#y">Gul</a>
<a href="#r">Röd</a>
</div>

<p>Dra sidled →</p>
</div>
</div>
</section>

<!-- KRISPLAN -->
<section class="page" id="kris">
<div class="shell">
<div class="glass">

<h2>Krisplan</h2>

<input id="psy" placeholder="Psykiakuten nummer">

<textarea id="gron" placeholder="Grön zon (det som hjälper)"></textarea>
<textarea id="gul" placeholder="Gul zon (det som hjälper)"></textarea>
<textarea id="rod" placeholder="Röd zon (det som hjälper)"></textarea>

<button onclick="save()">Spara</button>
<p id="msg"></p>

</div>
</div>
</section>

<!-- GRÖN -->
<section class="page" id="g">
<div class="shell">
<div class="glass">
<h2>🟢 Grön zon</h2>
<div id="outG" class="zoneBox green"></div>
</div>
</div>
</section>

<!-- GUL -->
<section class="page" id="y">
<div class="shell">
<div class="glass">
<h2>🟡 Gul zon</h2>
<div id="outY" class="zoneBox yellow"></div>
</div>
</div>
</section>

<!-- RÖD -->
<section class="page" id="r">
<div class="shell">
<div class="glass">
<h2>🔴 Röd zon</h2>
<div id="outR" class="zoneBox red"></div>
</div>
</div>
</section>

</div>

<script>
function load(){
  ["psy","gron","gul","rod"].forEach(id=>{
    document.getElementById(id).value = localStorage.getItem(id)||"";
  });
  render();
}

function save(){
  ["psy","gron","gul","rod"].forEach(id=>{
    localStorage.setItem(id,document.getElementById(id).value);
  });
  render();
  document.getElementById("msg").textContent="Sparat ✔";
}

function render(){
  document.getElementById("outG").textContent =
    localStorage.getItem("gron") || "Ingen text";

  document.getElementById("outY").textContent =
    localStorage.getItem("gul") || "Ingen text";

  document.getElementById("outR").textContent =
    localStorage.getItem("rod") || "Ingen text";
}

/* 🔥 extra trygghet */
function vibe(){
  if(navigator.vibrate) navigator.vibrate(80);
}

document.addEventListener("click", vibe);

load();

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
